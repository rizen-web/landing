  <rect width="1010" height="1080" fill="url(#fade)"/>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#071017" stop-opacity=".94"/>
      <stop offset=".66" stop-color="#071017" stop-opacity=".72"/>
      <stop offset="1" stop-color="#071017" stop-opacity="0"/>
    </linearGradient>
