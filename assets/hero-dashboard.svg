<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Streaming subscription dashboard visual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071017"/>
      <stop offset=".52" stop-color="#12313a"/>
      <stop offset="1" stop-color="#0f1822"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172431" stop-opacity=".96"/>
      <stop offset="1" stop-color="#0d141d" stop-opacity=".94"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0aa6a6"/>
      <stop offset="1" stop-color="#3467eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="38" flood-color="#02070a" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity=".18" stroke="#fff" stroke-width="1">
    <path d="M820 0 520 1080M980 0 680 1080M1140 0 840 1080M1300 0 1000 1080M1460 0 1160 1080M1620 0 1320 1080"/>
  </g>
  <circle cx="1480" cy="300" r="390" fill="#0aa6a6" opacity=".16"/>
  <circle cx="1650" cy="520" r="290" fill="#3467eb" opacity=".12"/>

  <g filter="url(#shadow)">
    <rect x="770" y="150" width="920" height="660" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".16" stroke-width="2"/>
    <text x="835" y="235" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">Subscription dashboard</text>
    <text x="838" y="280" fill="#c9d5dd" font-family="Segoe UI, Arial, sans-serif" font-size="22">Live orders, renewals and support</text>

    <g font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">
      <rect x="842" y="340" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="903" cy="396" r="31" fill="#df3f4c"/>
      <text x="903" y="407" fill="#fff" font-size="27">N</text>
      <rect x="870" y="430" width="66" height="7" rx="4" fill="#dce4eb"/>

      <rect x="1012" y="340" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="1073" cy="396" r="31" fill="#18a058"/>
      <text x="1073" y="407" fill="#fff" font-size="27">S</text>
      <rect x="1040" y="430" width="66" height="7" rx="4" fill="#dce4eb"/>

      <rect x="1182" y="340" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="1243" cy="396" r="31" fill="#3467eb"/>
      <text x="1243" y="407" fill="#fff" font-size="23">IP</text>
      <rect x="1210" y="430" width="66" height="7" rx="4" fill="#dce4eb"/>

      <rect x="842" y="500" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="903" cy="556" r="31" fill="#d89614"/>
      <text x="903" y="567" fill="#fff" font-size="29">+</text>
      <rect x="870" y="590" width="66" height="7" rx="4" fill="#dce4eb"/>

      <rect x="1012" y="500" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="1073" cy="556" r="31" fill="#8a5cf6"/>
      <text x="1073" y="567" fill="#fff" font-size="27">D</text>
      <rect x="1040" y="590" width="66" height="7" rx="4" fill="#dce4eb"/>

      <rect x="1182" y="500" width="122" height="116" rx="20" fill="#f7f9fb"/>
      <circle cx="1243" cy="556" r="31" fill="#0aa6a6"/>
      <text x="1243" y="567" fill="#fff" font-size="27">P</text>
      <rect x="1210" y="590" width="66" height="7" rx="4" fill="#dce4eb"/>
    </g>

    <rect x="850" y="675" width="300" height="120" rx="22" fill="#f7f9fb"/>
    <text x="880" y="720" fill="#101418" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Payment confirmed</text>
    <text x="880" y="755" fill="#5c6670" font-family="Segoe UI, Arial, sans-serif" font-size="17">Suribet • Uni5Pay • Bank</text>

    <rect x="1320" y="260" width="330" height="560" rx="40" fill="#071017" stroke="#fff" stroke-opacity=".18" stroke-width="2"/>
    <rect x="1350" y="310" width="270" height="452" rx="24" fill="#f7f9fb"/>
    <text x="1380" y="355" fill="#101418" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Rizen Support</text>
    <rect x="1376" y="400" width="190" height="60" rx="19" fill="#e6edf3"/>
    <text x="1398" y="437" fill="#101418" font-family="Segoe UI, Arial, sans-serif" font-size="17">Netflix Shared?</text>
    <rect x="1412" y="486" width="180" height="70" rx="19" fill="#0aa6a6"/>
    <text x="1432" y="526" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Ready after payment</text>
    <rect x="1376" y="602" width="220" height="72" rx="19" fill="#e6edf3"/>
    <text x="1398" y="645" fill="#101418" font-family="Segoe UI, Arial, sans-serif" font-size="17">Login delivered</text>
